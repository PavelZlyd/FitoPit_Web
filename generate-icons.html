<!DOCTYPE html>
<html>
<head><title>Генерация иконок FitoPit</title></head>
<body>
  <h2>Генерация иконок для PWA</h2>
  <p>Откройте DevTools → Вкладка Console → Сохраните каждое изображение.</p>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // Загружаем SVG как Image
    const img = new Image();
    img.src = `data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="%23667eea"/>
          <stop offset="100%" stop-color="%23f5576c"/>
        </linearGradient>
      </defs>
      <rect width="512" height="512" rx="128" fill="url(%23grad)" />
      <text x="140" y="360" font-family="Arial, sans-serif" font-size="280" font-weight="700" fill="white">FP</text>
    </svg>`;

    img.onload = function () {
      sizes.forEach(size => {
        canvas.width = size;
        canvas.height = size;

        // Рисуем масштабированное изображение
        ctx.clearRect(0, 0, size, size);
        ctx.drawImage(img, 0, 0, size, size);

        // Экспортируем
        const dataUrl = canvas.toDataURL('image/png');
        console.log(`Иконка ${size}x${size}:`);
        console.log(dataUrl);
        console.log(`--- Сохраните эту ссылку как icon-${size}x${size}.png ---`);
      });

      alert('✅ Все иконки сгенерированы! Откройте Console, чтобы скопировать ссылки.');
    };
  </script>
</body>
</html>
