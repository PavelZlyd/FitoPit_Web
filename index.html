<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitoPit — Персональный план питания</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
</head>
<body>
<div class="background"></div>
<canvas id="particles"></canvas>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">FP</div>
      <div class="logo-text">FitoPit</div>
    </div>
    <p>Создай персональный план питания за 1 клик</p>
    <div class="controls">
      <div class="lang-toggle">
        <button onclick="switchLang('ru')" data-lang="ru">🇷🇺</button>
        <button onclick="switchLang('en')" data-lang="en">🇬🇧</button>
      </div>
      <div class="theme-toggle">
        <button onclick="toggleTheme()">🌙</button>
      </div>
    </div>
  </header>

  <main class="content">
    <form id="nutritionForm">
      <div class="form-group">
        <label for="age">Возраст</label>
        <input type="number" id="age" name="age" min="14" max="100" required placeholder="25" value="25">
      </div>

      <div class="form-group">
        <label for="gender">Пол</label>
        <select id="gender" name="gender" required>
          <option value="male">Мужской</option>
          <option value="female">Женский</option>
        </select>
      </div>

      <div class="form-group">
        <label for="weight">Вес (кг)</label>
        <input type="number" id="weight" name="weight" min="40" max="200" step="0.1" required placeholder="70" value="70">
      </div>

      <div class="form-group">
        <label for="height">Рост (см)</label>
        <input type="number" id="height" name="height" min="140" max="220" required placeholder="175" value="175">
      </div>

      <div class="form-group">
        <label for="activity">Активность</label>
        <select id="activity" name="activity" required>
          <option value="1.2">Минимальная (сидячая работа)</option>
          <option value="1.375">Низкая</option>
          <option value="1.55" selected>Средняя (3-5 тренировки)</option>
          <option value="1.725">Высокая</option>
          <option value="1.9">Очень высокая</option>
        </select>
      </div>

      <div class="form-group">
        <label for="goal">Цель</label>
        <select id="goal" name="goal" required>
          <option value="maintain" selected>Поддержание веса</option>
          <option value="lose">Похудение</option>
          <option value="gain">Набор массы</option>
        </select>
      </div>

      <div class="form-group">
        <label for="diet">Диета</label>
        <select id="diet" name="diet" required>
          <option value="normal" selected>Обычная</option>
          <option value="vegetarian">Вегетарианская</option>
          <option value="vegan">Веганская</option>
          <option value="glutenfree">Без глютена</option>
        </select>
      </div>

      <div class="form-group">
        <label for="breakfastType">Завтрак</label>
        <select id="breakfastType" name="breakfastType" required>
          <option value="normal" selected>Обычный</option>
          <option value="light">Лёгкий</option>
        </select>
      </div>

      <div class="form-group">
        <label>Аллергии</label>
        <div class="checkbox-group" id="allergies">
          <div class="checkbox-item"><input type="checkbox" id="allergy-dairy" value="dairy"><label for="allergy-dairy">Молочные</label></div>
          <div class="checkbox-item"><input type="checkbox" id="allergy-nuts" value="nuts"><label for="allergy-nuts">Орехи</label></div>
          <div class="checkbox-item"><input type="checkbox" id="allergy-gluten" value="gluten"><label for="allergy-gluten">Глютен</label></div>
          <div class="checkbox-item"><input type="checkbox" id="allergy-eggs" value="eggs"><label for="allergy-eggs">Яйца</label></div>
          <div class="checkbox-item"><input type="checkbox" id="allergy-fish" value="fish"><label for="allergy-fish">Рыба</label></div>
          <div class="checkbox-item"><input type="checkbox" id="allergy-soy" value="soy"><label for="allergy-soy">Соя</label></div>
        </div>
      </div>

      <div>
        <button type="submit">🎯 Создать план</button>
        <button type="reset">🗑 Очистить</button>
      </div>
    </form>

    <div id="result" style="display: none;">
      <h2>Твой план питания</h2>
      <p>Ежедневные калории: <strong id="calories">0</strong> ккал <span id="calorieStatus"></span></p>

      <div id="tabs-container"></div>
      <div id="mealPlan"></div>

      <div class="plan-actions">
        <button id="copyPlan">📋 Копировать план</button>
      </div>
    </div>
  </main>

  <footer>
    <p>© 2025 FitoPit. Еда — это просто.</p>
  </footer>
</div>

<!-- Скрипты -->
<script src="data.js"></script>
<script src="generator.js"></script>
<script src="ui.js"></script>

<!-- Частицы -->
<script>
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];
  const particleCount = 100;
  const color = getComputedStyle(document.body).getPropertyValue('--particle-color-light');

  for (let i = 0; i < particleCount; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      radius: Math.random() * 2 + 1,
      speedX: (Math.random() - 0.5) * 0.5,
      speedY: (Math.random() - 0.5) * 0.5
    });
  }

  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = color;
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fill();
      p.x += p.speedX;
      p.y += p.speedY;
      if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
      if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
    });
    requestAnimationFrame(drawParticles);
  }

  drawParticles();

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  }

  const saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
  }
</script>
</body>
</html>
